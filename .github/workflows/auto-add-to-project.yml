name: Auto Add to Project

on:
  issues:
    types:
      - opened
      - reopened

jobs:
  add-to-project:
    runs-on: ubuntu-latest
    steps:
      - name: Add issue to project
        uses: actions/add-to-project@v1.0.2
        with:
          project-url: https://github.com/users/taicki/projects/4
          github-token: ${{ secrets.ADD_TO_PROJECT_PAT }}
