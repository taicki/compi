name: Close Old Automation Issues

on:
  schedule:
    # 매일 오전 9시 (KST 기준, UTC 0시)에 실행
    - cron: '0 0 * * *'
  workflow_dispatch:  # 수동 실행 가능

jobs:
  close-issues:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Close old automation issues
        uses: actions/github-script@v7
        with:
          script: |
            const now = new Date();

            // 기본 보관 기간: automated 라벨이 있는 이슈는 3일 후 자동 닫기
            // 저장소별로 필요시 이 값을 조정하세요
            const DEFAULT_RETENTION_DAYS = 3;

            // 제목 패턴별 예외 설정 (선택사항)
            // 특정 패턴의 이슈에 대해 다른 보관 기간을 설정할 수 있습니다
            const titleRetentionRules = [
              // 예시: { pattern: '[특정 패턴]', days: 7 },
            ];

            console.log('Fetching open issues with "automated" label...');

            // automated 라벨이 있는 이슈만 가져오기
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'automated',
              per_page: 100
            });

            console.log(`Found ${issues.data.length} open automated issues`);
            let closedCount = 0;

            for (const issue of issues.data) {
              const createdAt = new Date(issue.created_at);

              let retentionDays = DEFAULT_RETENTION_DAYS;
              let reason = 'automated 라벨';

              // 제목 패턴으로 보관 기간 오버라이드 (선택사항)
              for (const rule of titleRetentionRules) {
                if (issue.title.includes(rule.pattern)) {
                  retentionDays = rule.days;
                  reason = `제목 패턴 "${rule.pattern}"`;
                  break;
                }
              }

              const cutoffDate = new Date(now);
              cutoffDate.setDate(cutoffDate.getDate() - retentionDays);

              if (createdAt < cutoffDate) {
                const ageInDays = Math.floor((now - createdAt) / (1000 * 60 * 60 * 24));

                console.log(`Closing issue #${issue.number}: ${issue.title}`);
                console.log(`  Created: ${createdAt.toISOString()}`);
                console.log(`  Age: ${ageInDays} days`);
                console.log(`  Reason: ${reason} (${retentionDays}일 경과)`);

                try {
                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issue.number,
                    body: `✅ ${reason}에 해당하는 자동 생성 이슈가 ${retentionDays}일이 경과하여 자동으로 닫습니다.\n\n생성일: ${createdAt.toISOString().split('T')[0]}\n경과 일수: ${ageInDays}일`
                  });

                  await github.rest.issues.update({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issue.number,
                    state: 'closed'
                  });

                  closedCount++;
                } catch (error) {
                  console.error(`Failed to close issue #${issue.number}:`, error.message);
                }

                // API rate limit 방지를 위한 딜레이
                await new Promise(resolve => setTimeout(resolve, 1000));
              }
            }

            console.log(`\nSummary: Closed ${closedCount} issue(s)`);
