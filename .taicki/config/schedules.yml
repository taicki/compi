# jarvis-claw 스케줄 설정
# ⚠️ 요일 숫자는 APScheduler(Python) 기준: 0=월, 6=일
#    UNIX cron(0=일)과 다르므로 이름 사용 권장 (mon-fri, sat, sun 등)
- name: operator
  title: 컴피 자율 운영 에이전트
  cron: "0 5 * * *"
  enabled: true
  prompt_file: .taicki/project/operator/operator-prompt.md

- name: issue-manager
  title: 컴피 이슈 관리 에이전트
  cron: 20 7 * * *
  enabled: true
  prompt_file: .taicki/project/operator/issue-manager-prompt.md

- name: issue-solver
  title: 이슈 해결 에이전트 (14:30)
  cron: 30 14 * * *
  enabled: true
  prompt_file: .taicki/project/operator/solver-prompt.md
