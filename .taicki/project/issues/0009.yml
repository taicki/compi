id: 9
title: "OGP / Twitter Card 메타태그 전 페이지 통일 — 소셜 공유 미리보기"
created: "2026-06-01"
status: closed
closed_date: "2026-06-22"
priority: medium
labels: [seo, feature]
created_at: "2026-06-22"
dod: "홈·상세·과목 페이지 전체에 og:title/og:description/og:url/og:image/twitter:card가 통일되어 있고, 빌드가 통과된 상태"
body: |
  ## 현상
  - index.astro(홈): OGP 메타태그 전혀 없음
  - contests/[id].astro: og:title/description/type만 있고 og:url·og:image·twitter:card 누락
  - subjects/[subject].astro: 동일 문제

  카카오톡, 트위터 등에서 링크 공유 시 미리보기가 나오지 않아 소셜 유입 기회 손실.

  ## 구현 범위
  1. site/src/components/BaseHead.astro 신규 생성
     - og:title, og:description, og:url, og:image, og:type
     - twitter:card, twitter:title, twitter:description
     - canonical URL
  2. index.astro에 BaseHead 적용 + OGP 추가
  3. contests/[id].astro에 누락 태그 보완
  4. subjects/[subject].astro에 누락 태그 보완
  5. og:image는 /compi/og-default.png 기본 이미지 사용
