title: "FAQ 페이지 생성 — 경시대회 자주 묻는 질문 롱테일 SEO 확보"
created: "2026-06-30"
status: closed
closed_date: "2026-06-30"
priority: medium
labels: [seo, content]
created_at: "2026-06-30"
body: |
  ## 목적
  경시대회 관련 자주 묻는 질문 페이지(/faq/)를 생성해 롱테일 SEO 키워드를 확보한다.
  학부모들이 검색하는 "수학경시대회 접수비", "경시대회란 무엇인가", "초등 경시대회 추천" 등.

  ## 해결 방향
  1. site/src/pages/faq.astro 신규 생성
  2. FAQ 10~15개 작성 (경시대회 종류, 준비 방법, 접수비, 대상 학년 등)
  3. FAQPage JSON-LD 구조화 데이터 삽입 (리치 스니펫)
  4. 홈 페이지 푸터 또는 네비게이션에서 FAQ 링크 추가

  ## 사용자 가치
  - 학부모: "경시대회가 뭔가요?" 부터 "접수비는 얼마인가요?" 까지 한 페이지에서 해결
  - SEO: FAQPage 리치 스니펫으로 검색결과 면적 확대
  - 롱테일 키워드: "초등 수학경시대회 추천", "경시대회 준비 방법" 등

  ## 완료 기준
  - /faq/ 페이지 빌드 통과
  - FAQPage JSON-LD 삽입
  - 홈 페이지에서 FAQ 링크 접근 가능
