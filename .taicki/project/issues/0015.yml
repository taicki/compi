  와이프·첫째 제안. 초중등 자녀 학부모 타겟이 겹쳐 자연스러운 확장. 피아노·바이올린 등 전국 단위 콩쿨(이화경향, 음협, 한국피아노콩쿨 등)부터 파일럿 수집. 카테고리를 music으로 분리해 기존 경시대회 브랜드 포커스 유지.
