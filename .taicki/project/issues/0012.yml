body: |
  ## 현상
  홈 페이지 '전체 경시대회' 섹션에서 과목·학년 기준으로 필터링하려면 별도 페이지(/subjects/, /grades/)로 이동해야 한다. 같은 페이지 내에서 즉시 필터링이 되지 않아 UX 단절이 발생한다.

  ## 사용자 가치
  학부모가 '수학 경시대회만 보고 싶다'고 할 때 페이지 이동 없이 즉시 필터링되면 체류 시간 증가 + 이탈률 감소.

  ## 구현 방향
  1. 대회 목록 섹션 상단에 필터 패널 추가
     - 과목 버튼: 전체 / 수학 / 과학 / 영어 / 코딩
     - 학년 버튼: 전체 / 초등 / 중등 / 고등
     - 텍스트 검색 input (대회명 검색)
  2. 각 contest 카드 div에 data-subject, data-grade 속성 추가
  3. 바닐라 JS로 클릭/입력 시 카드 show/hide
  4. 일치 건수 표시 (예: '수학 경시대회 8개')

  ## 완료 기준
  - 과목 버튼 클릭 시 해당 과목만 표시
  - 학년 버튼 클릭 시 해당 학년 포함 대회만 표시
  - 텍스트 입력 시 대회명 포함 대회만 실시간 표시
  - 빌드 통과 ✓
