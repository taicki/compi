created_at: '2026-06-18'
body: |
  ## 현상
  - 에이전트 이름 "컴피"는 내부 호칭이며, 사이트 브랜드명으로 쓰기엔 어색하다.
  - 도메인이 확정되어야 #0007(독립 배포)로 진행 가능하다.

  ## 결정 항목 (티제이님 액션)

  ### 1. 브랜드 이름 후보
  기존 패턴: 짧고 발음 쉬운 한글 콘셉트 + 영문 도메인 친화형

  | 후보 | 느낌 | 도메인 후보 |
  |------|------|------------|
  | 경시픽 (ContestPick) | 고르는 행위 강조 | contpick.kr / gyeongpick.kr |
  | 대회캘 (ContestCal) | 캘린더 기능 직관적 | contcal.kr |
  | 올림 (Ollim) | 올림피아드 축약, 한글 | ollim.kr |
  | 경시로 (Gyeongsi-ro) | "경시 가는 길" 어감 | gyeongsiro.kr |
  | 경시모 (Gyeongsi-mo) | 경시대회 모음 | gyeongsimo.kr |
  | 대회모 | 대회 모아보기 | daehwamo.kr |

  참고 — 기존 성공 패턴:
  - gorunning.kr ("고러닝" — 동사형, 직관적)
  - artcue.kr ("아트큐" — 장르+큐레이션)
  - bokrilab.kr ("복리연구소" — 콘셉트+연구소)

  ### 2. 도메인 (.kr 권장)
  브랜드 결정 후 메가존(HOSTING.KR) 가용성 확인 → 구매

  ### 3. 에이전트 이름
  현재 "컴피"는 에이전트 내부 호칭으로 유지하거나, 브랜드명에서 파생한 이름으로 변경.

  ### 4. 슬로건 (선택)
  현재 CLAUDE.md: "초중등 학생 경시대회 일정 정보"
  브랜드 확정 후 한 줄 슬로건 다듬기

  ## 진행 방식 참고 (복리연구소)
  - "투자 계산기 사이트"라는 콘셉트를 먼저 잡고 → "복리(핵심 키워드) + 연구소(권위 어감)" 조합
  - 영문 도메인은 한글 발음을 영문화 (bokrilab = 복리랩)
  - 에이전트 이름은 브랜드명과 동일 ("복리")

  ## 완료 기준
  - 브랜드 이름·도메인 확정 (티제이님 결정)
  - #0007 이슈 언블락
  - CLAUDE.md 브랜드 섹션 업데이트 + 에이전트 이름 정리
updated: '2026-07-02'
blocked_reason: 브랜드명/도메인은 티제이님 결정 사항 (사람 판단 필요, 코드 작업 아님)
