id: "0006"
title: "사이트 이름 + 브랜드 아이덴티티 확정 — 도메인 구입 전제"
status: open
priority: high
labels: [branding, setup]
created_at: "2026-06-18"
body: |
  ## 현상
  CLAUDE.md에 "이름: 컴피 (Compi)", "도메인: TBD (compi.kr 등 검토)"로 미결.
  브랜드와 도메인이 확정되어야 #0007(도메인 구입)로 진행 가능하다.

  ## 기존 사이트 브랜드 패턴 참고

  | 사이트 | 브랜드 | 도메인 | 에이전트 이름 |
  |--------|--------|--------|--------------|
  | 러닝 대회 | 고러닝 (GoRunning) | gorunning.kr | 조이 |
  | 미술관·전시 | 아트큐 (ArtCue) | artcue.kr | 뮤즈 |
  | 배당·복리 정보 | 복리연구소 (Bokri Lab) | bokrilab.kr | 복리 |
  | 등산화 비교 | 써밋 (Summit) | hiking-shoes — blocked #8 | 써밋 |

  패턴: **짧은 한글 발음 + 영문 브랜드 병기 + .kr 도메인** (gorunning / artcue / bokrilab).
  에이전트 이름 = 브랜드에서 따온 친숙한 한 단어.

  ## 결정이 필요한 항목 (티제이님 액션)
  1. **사이트 이름 확정**: "컴피"가 최종인지, 아니면 다른 후보가 있는지
     - 후보 예: 컴피(Compi) / 경시론 / 스터디픽 / 경시픽(ContestPick) 등
  2. **도메인 후보 확정**:
     - compi.kr — 짧고 발음 쉬움, 브랜드와 1:1 대응
     - 참고: gorunning.kr / artcue.kr / bokrilab.kr 모두 메가존(HOSTING.KR) 구매
  3. **에이전트 이름 확정**: 현재 "컴피" (브랜드와 동일) — 적절하면 그대로 유지
  4. **슬로건/타겟 포지션 문구**: 현재 CLAUDE.md 내용으로 충분한지 확인

  ## 복리연구소(bokrilab.kr) 네이밍 진행 방식 참고
  - "복리연구소 (Bokri Lab)" = 한글 콘셉트(복리) + 영문 도메인 친화형(bokrilab)으로 조합
  - 도메인 가용성 확인 → 메가존(HOSTING.KR)에서 .kr 구매 → Cloudflare DNS 연결

  ## 완료 기준
  - 사이트 이름·도메인·에이전트명 확정 (티제이님 결정)
  - #0007(도메인 구입) 이슈 언블락
  - CLAUDE.md 브랜드 섹션 업데이트
