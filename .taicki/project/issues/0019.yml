body: |
  홈 페이지(index.astro)에 Schema.org WebSite 타입과 SearchAction을 추가한다.
  구글은 WebSite JSON-LD가 있을 때 검색 결과에 사이트링크 검색창을 표시할 수 있다.
  현재 상세·목록 페이지에는 Event/ItemList JSON-LD가 있지만 홈에는 구조화 데이터가 없다.
  추가 내용:
  - @type: WebSite, name, url
  - potentialAction: SearchAction (query-input 포함)
  - BreadcrumbList (홈 → 최상위)
