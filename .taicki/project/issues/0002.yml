title: "taicki.dev/compi/ 서브패스 배포 — 도메인 확정 전 임시 런칭"
created: "2026-06-01"
status: in_progress
priority: high
labels: [infra, deploy]
created_at: "2026-06-18"
body: |
  ## 현상
  사이트가 로컬에서만 동작한다. 배포 없으면 GSC 등록도, SEO 크롤링도, 실사용자 검증도 불가.
  hiking-shoes와 마찬가지로 도메인이 미정인 상태에서 먼저 taicki.dev 서브패스로 배포한다.

  ## 격자 근거
  레이어 0 (Search 모드): 가장 싸게 배우는 방법은 빠른 배포 후 GSC 데이터 관찰.
  PSF 검증은 실사용자 방문 없이는 불가능하다.

  ## 인프라 패턴 (taicki-dev-home 방식)
  - 서버: taek-amzlnx-1 (SSH alias), EC2 + nginx 정적 서빙
  - 배포: astro build → dist/ → rsync → EC2 /projects/compi/
  - URL: https://taicki.dev/compi/
  - 참고: ~/w/code/personal/taicki-dev-home/ (CLAUDE.md, justfile 확인)
  - .dev TLD는 HSTS 프리로드 — HTTPS 필수 (기존 nginx에서 이미 처리 중)

  ## 해결 방향
  1. site/astro.config.mjs: `site: "https://taicki.dev"`, `base: "/compi"` 설정
  2. site/src/config.ts: SITE_URL 단일 출처로 관리 (도메인 전환 시 1줄 수정)
  3. 배포 스크립트 scripts/deploy.sh 생성:
     - `npm run build` (site/ 디렉토리)
     - `rsync -avz --delete dist/ taek-amzlnx-1:/home/ec2-user/projects/compi/`
  4. nginx 서버에 /compi/ 경로 설정 확인 (taicki-dev-home 또는 server-management 참고)
  5. https://taicki.dev/compi/ 접근 확인

  ## 이후 전환 (의존: #0006 도메인 구입)
  - 도메인 확정 시 astro.config.mjs site URL 1줄 수정
  - nginx 설정에 독립 도메인 추가 + Cloudflare DNS 연결

  ## 완료 기준
  - https://taicki.dev/compi/ 에서 컴피 홈페이지 정상 접근
  - 내부 링크 모두 /compi/ base 경로로 동작
  - #0003(GA4/GSC) 연결 가능한 URL 확보
