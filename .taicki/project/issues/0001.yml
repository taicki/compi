id: "0001"
title: "경시대회별 개별 상세 페이지 생성 — 롱테일 SEO 진입점 확보"
status: open
priority: high
labels: [seo, feature]
created_at: "2026-06-18"
body: |
  ## 현상
  현재 site/src/pages/index.astro 단 하나의 페이지만 존재한다.
  "KMO 2026 일정", "한국수학올림피아드 접수 마감" 같은 롱테일 키워드로
  구글에서 유입될 진입점이 0개다.

  ## 격자 근거
  레이어 3 (유통): Product-Channel Fit 원칙 — SEO로 갈 거면
  SEO에 핏된 구조(대량·롱테일 개별 페이지)를 처음부터 설계해야 한다.
  Pillar-Cluster: 대회별 페이지(클러스터)가 없으면 토픽 권위 축적 불가.

  ## 해결 방향
  - `site/src/pages/contests/[id].astro` 동적 라우팅 페이지 생성
  - 각 대회 페이지: 일정 테이블, D-Day, 접수 링크, 요약, pros 목록 포함
  - SEO 메타: `<title>KMO 한국수학올림피아드 2026 일정·접수 | 컴피</title>`
  - 사이트맵 자동 반영 (@astrojs/sitemap 기존 설정 활용)

  ## 완료 기준
  - 20개 대회 모두 /contests/{id}/ URL로 접근 가능
  - 각 페이지 고유 title·description 메타 포함
  - `npm run build` 성공 + Playwright로 3개 페이지 스크린샷 확인
